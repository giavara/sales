<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mentor — Sales proposals</title>
<link rel="icon" href="assets/mentor-mark-black.svg" />
<meta name="robots" content="noindex" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
@font-face{font-family:'Poppins';font-weight:400;font-style:normal;font-display:swap;src:url('fonts/Poppins-Regular.ttf') format('truetype');}
@font-face{font-family:'Poppins';font-weight:500;font-style:normal;font-display:swap;src:url('fonts/Poppins-Medium.ttf') format('truetype');}
@font-face{font-family:'Poppins';font-weight:600;font-style:normal;font-display:swap;src:url('fonts/Poppins-SemiBold.ttf') format('truetype');}
@font-face{font-family:'Poppins';font-weight:700;font-style:normal;font-display:swap;src:url('fonts/Poppins-Bold.ttf') format('truetype');}
:root{
  --ink:#000;--white:#fff;--orange:#FF7237;
  --g050:#FAFAF8;--g200:#E4E4DF;--g300:#C7C7C2;--g400:#9A9A96;--g500:#6E6E6B;--g600:#4A4A48;
  --font:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--ink);color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;padding:clamp(32px,7vw,110px);}
.mark{position:fixed;right:-140px;bottom:-160px;height:640px;opacity:.05;pointer-events:none;}
header{margin-bottom:auto;}
.logo{height:34px;}
.eyebrow{font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);margin:64px 0 20px;}
h1{font-size:clamp(40px,6vw,80px);line-height:1.02;letter-spacing:-0.03em;font-weight:600;max-width:16ch;}
h1 .o{color:var(--orange);}
.sub{font-size:clamp(18px,2vw,24px);color:rgba(255,255,255,.6);margin-top:26px;max-width:44ch;line-height:1.5;}
.list{margin-top:clamp(40px,6vw,72px);display:flex;flex-direction:column;gap:16px;max-width:820px;}
.item{display:flex;align-items:center;gap:26px;padding:28px 32px;border:1px solid rgba(255,255,255,.14);border-radius:16px;
  text-decoration:none;color:inherit;transition:border-color .18s,transform .18s,background .18s;background:rgba(255,255,255,.02);}
.item:hover{border-color:var(--orange);transform:translateX(6px);background:rgba(255,255,255,.04);}
.item.soon{opacity:.4;pointer-events:none;}
.dot{width:12px;height:12px;border-radius:999px;background:var(--orange);flex:none;}
.item.soon .dot{background:var(--g400);}
.meta{flex:1;}
.name{font-size:clamp(22px,2.4vw,30px);font-weight:600;}
.desc{font-size:16px;color:rgba(255,255,255,.5);margin-top:4px;}
.go{font-size:15px;font-weight:500;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:8px;}
.item:hover .go{color:var(--orange);}
footer{margin-top:auto;padding-top:64px;font-size:14px;color:rgba(255,255,255,.35);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;}
</style>
</head>
<body>
<img class="mark" src="assets/mentor-mark-white.svg" alt="" />
<header><img class="logo" src="assets/mentor-logo-white-dot.svg" alt="mentor" /></header>

<div>
  <div class="eyebrow">Sales · Proposte</div>
  <h1>Proposte commerciali<span class="o">.</span></h1>
  <p class="sub">Deck di vendita interattivi, un link per ogni lead. Costruiti sul design system mentor.</p>
</div>

<div class="list">
  <a class="item" href="conidia/">
    <span class="dot"></span>
    <div class="meta">
      <div class="name">Conidia</div>
      <div class="desc">Amazon growth — setup + advertising · Fuelstat &amp; AquaFighter · IT/DE/FR/ES</div>
    </div>
    <span class="go">Apri deck <span data-lucide="arrow-right"></span></span>
  </a>
  <!-- Nuovi lead: duplica la cartella conidia/, rinomina, aggiungi una voce qui. -->
</div>

<footer>
  <span>marketplace-mentor.com</span>
  <span>Crescita nei marketplace, senza fumo.</span>
</footer>

<script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
